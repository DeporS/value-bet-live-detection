networks:
  value_engine_net:
    driver: bridge

volumes:
  kafka_data:
    driver: local
  postgres_data:
    driver: local
  postgres-airflow-data:
    driver: local

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    networks:
      - value_engine_net
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two ports: 29092 for docker-internal communication, 9092 for host access
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "live-football-engine-cluster"
    # volumes:
    #   - kafka_data:/tmp/kafka-logs

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - value_engine_net
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=LocalCluster
      # Connects to the internal Kafka broker using the internal hostname and port
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka

  kafka-setup:
    image: apache/kafka:3.7.0
    container_name: kafka-setup
    networks:
      - value_engine_net
    depends_on:
      - kafka
    # Script waits 5 seconds for Kafka to start, then creates the necessary topics if they don't exist
    command: >
      bash -c "
        sleep 5 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic raw_match_events --bootstrap-server kafka:29092 --partitions 2 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic raw_odds_events --bootstrap-server kafka:29092 --partitions 2 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic model_features --bootstrap-server kafka:29092 --partitions 2 --replication-factor 1 &&
        echo 'Initialized all Kafka topics.'
      "

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    networks:
      - value_engine_net
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=engine_user
      - POSTGRES_PASSWORD=engine_pass
      - POSTGRES_DB=value_engine_db

  ingestion-service:
    build:
      # context - main folder of the project
      context: .
      dockerfile: services/ingestion_service/Dockerfile
    container_name: ingestion_service
    networks:
      - value_engine_net
    environment:
      # Kafka address for the ingestion service to connect to
      - KAFKA_BROKER=kafka:29092
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    restart: on-failure
    env_file:
      - .env

  streaming-processor:
    build:
      context: .
      dockerfile: services/streaming_processor/Dockerfile
    container_name: streaming_processor
    networks:
      - value_engine_net
    volumes:
      - ./data:/app/data
    environment:
      - KAFKA_BROKER=kafka:29092
    depends_on:
      kafka-setup:
        condition: service_completed_successfully

  postgres-airflow:
    image: postgres:13
    restart: always
    environment:
      - POSTGRES_USER=airflow
      # TODO: Change this password to something secure in production! --- IGNORE ---
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - POSTGRES_DB=airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@postgres-airflow/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW_ADMIN_USERNAME=${AIRFLOW_ADMIN_USERNAME}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}
      - AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL}
    volumes:
      - ./scripts/init_user.sh:/opt/airflow/init_user.sh
    # Automatically execute database migrations and create the default admin user
    command: >
      bash -c "
        bash /opt/airflow/init_user.sh
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@postgres-airflow/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false # Turn off example DAGs to keep the UI clean
      - AIRFLOW__SCHEDULER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    user: "50000:${DOCKER_GID:-0}"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres-airflow:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@postgres-airflow/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__SCHEDULER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    user: "50000:${DOCKER_GID:-0}"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    depends_on:
      postgres-airflow:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
